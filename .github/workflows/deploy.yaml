name: Deploy code

on:
  push:
    branches: ['main']

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  VPS_HOST: root@167.179.72.25
  VPS_PATH: /var/www/nanyaru/source
  SSH_OPTS: -i ~/.ssh/id_rsa -o ConnectTimeout=30 -o ServerAliveInterval=30 -o ServerAliveCountMax=5

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Check if dependencies changed
        id: deps
        run: |
          if git diff HEAD~1 --name-only | grep -qE '(yarn\.lock|package\.json)$'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: yarn install --frozen-lockfile --prefer-offline

      - name: Create .env
        run: |
          cat << EOF > .env
          NEXT_PUBLIC_LINE_CHANNEL_ACCESS_TOKEN=${{ secrets.NEXT_PUBLIC_LINE_CHANNEL_ACCESS_TOKEN }}
          NEXT_PUBLIC_LINE_CHANNEL_SECRET=${{ secrets.NEXT_PUBLIC_LINE_CHANNEL_SECRET }}
          NEXT_PUBLIC_LINE_CLEANING_GROUP_ID=${{ secrets.NEXT_PUBLIC_LINE_CLEANING_GROUP_ID }}
          NEXT_PUBLIC_GOOGLE_CLIENT_EMAIL=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_EMAIL }}
          NEXT_PUBLIC_GOOGLE_PRIVATE_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_PRIVATE_KEY }}
          NEXT_PUBLIC_CLEANING_GOOGLE_SHEET_ID=${{ secrets.NEXT_PUBLIC_CLEANING_GOOGLE_SHEET_ID }}
          IMGBB_API_KEY=${{ secrets.IMGBB_API_KEY }}
          NEXT_PUBLIC_CLEANING_CMS_API_URL=${{ secrets.NEXT_PUBLIC_CLEANING_CMS_API_URL }}
          EOF

      - name: Build
        env:
          NODE_OPTIONS: --max_old_space_size=4096
        run: yarn build

      - name: Set up SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Kill lingering build processes on VPS
        continue-on-error: true
        run: |
          ssh $SSH_OPTS $VPS_HOST "pkill -9 -f 'next build' || true; pkill -9 -f 'tsc.*next' || true; exit 0"

      - name: Rsync build artifacts to VPS
        env:
          DEPS_CHANGED: ${{ steps.deps.outputs.changed }}
        run: |
          rsync -avz --delete --exclude='cache' \
            -e "ssh $SSH_OPTS" \
            .next/ $VPS_HOST:$VPS_PATH/.next/

          rsync -avz --delete \
            -e "ssh $SSH_OPTS" \
            public/ $VPS_HOST:$VPS_PATH/public/

          rsync -avz \
            -e "ssh $SSH_OPTS" \
            package.json yarn.lock next.config.ts ecosystem.config.js .env \
            $VPS_HOST:$VPS_PATH/

          if [ "$DEPS_CHANGED" = "true" ]; then
            echo "Syncing node_modules..."
            rsync -avz --delete \
              -e "ssh $SSH_OPTS" \
              node_modules/ $VPS_HOST:$VPS_PATH/node_modules/
          else
            echo "Dependencies unchanged, skipping node_modules sync."
          fi

      - name: Restart app
        run: |
          ssh $SSH_OPTS $VPS_HOST "cd $VPS_PATH && pm2 reload ecosystem.config.js"
