<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>処理中... | クリーニング予約フォーム</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
	<style>
		*, *::before, *::after {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: 'Noto Sans JP', sans-serif;
			background: #f9fafb;
			color: #1f2937;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 24px;
		}

		.card {
			background: #fff;
			border-radius: 12px;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
			padding: 32px 24px;
			text-align: center;
			max-width: 360px;
			width: 100%;
		}

		.spinner {
			width: 48px;
			height: 48px;
			margin: 0 auto 20px;
			border: 4px solid #dcfce7;
			border-top-color: #22c55e;
			border-radius: 50%;
			animation: spin 0.8s linear infinite;
		}

		@keyframes spin {
			to { transform: rotate(360deg); }
		}

		h3 {
			font-size: 16px;
			font-weight: 600;
			color: #111827;
			margin-bottom: 8px;
		}

		p {
			font-size: 13px;
			color: #6b7280;
		}

		.close-btn {
			display: none;
			width: 100%;
			margin-top: 24px;
			padding: 14px 24px;
			font-family: inherit;
			font-size: 16px;
			font-weight: 600;
			color: #fff;
			background: linear-gradient(to right, #4ade80, #22c55e);
			border: none;
			border-radius: 8px;
			text-decoration: none;
			text-align: center;
			cursor: pointer;
			box-sizing: border-box;
		}

		.close-btn.is-visible {
			display: block;
		}

		.noscript-notice {
			margin-top: 20px;
			padding: 12px;
			font-size: 12px;
			color: #b91c1c;
			background: #fee2e2;
			border-radius: 8px;
		}

		.noscript-notice a {
			display: inline-block;
			margin-top: 8px;
			color: #fff;
			background: #22c55e;
			padding: 8px 16px;
			border-radius: 6px;
			text-decoration: none;
			font-weight: 600;
		}
	</style>
</head>

<body>

	<div class="card">
		<div class="spinner"></div>
		<h3>処理中です</h3>
		<p>予約フォームへ移動しています。<br>しばらくお待ちください...</p>
		<!-- Anchor fallback: href is updated by JS with stashed params before auto-redirect.
		     If JS fails or is disabled, user can tap to reach nanyaru without params. -->
		<a id="manualLink" href="https://nanyaru.com/cleaning/register" class="close-btn">
			予約フォームへ進む
		</a>
		<noscript>
			<div class="noscript-notice">
				JavaScriptが無効のため自動で移動できません。<br>
				<a href="https://nanyaru.com/cleaning/register">予約フォームへ進む</a>
			</div>
		</noscript>
	</div>

	<!-- 削除禁止 -->
	<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
	<script src="liff-starter.js"></script>
	<script>
		var NANYARU_URL = 'https://nanyaru.com/cleaning/register';

		function buildRedirectUrl() {
			var params = new URLSearchParams();
			try {
				var raw = sessionStorage.getItem('cleaningFormData');
				if (raw) {
					var data = JSON.parse(raw);
					if (data.col_1_name) params.set('col_1_name', data.col_1_name);
					if (data.col_3_tel) params.set('col_3_tel', data.col_3_tel);
					if (data.luid) params.set('luid', data.luid);
					sessionStorage.removeItem('cleaningFormData');
				}
			} catch (err) {}
			var qs = params.toString();
			return qs ? NANYARU_URL + '?' + qs : NANYARU_URL;
		}

		window.onload = function (e) {
			// Init LIFF (best-effort, not required for redirect to work)
			try {
				liff.init({ liffId: "###liffid###" }).catch(function () {});
			} catch (err) {}

			// Compute redirect URL once, populate manual fallback link, then auto-redirect.
			var url = buildRedirectUrl();
			var link = document.getElementById('manualLink');
			if (link) link.href = url;

			// Show manual button after 1.2s so user has a tap-target if auto-redirect stalls.
			setTimeout(function () {
				if (link) link.classList.add('is-visible');
			}, 1200);

			// Auto-redirect after a brief moment so user sees "processing" feedback
			setTimeout(function () {
				try {
					window.location.replace(url);
				} catch (err) {
					if (link) link.classList.add('is-visible');
				}
			}, 600);
		};
	</script>
	<!-- 削除禁止 -->

</body>

</html>
